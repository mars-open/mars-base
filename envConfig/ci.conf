env {
  name = "dev"
  geometriesPath = "s3a://zzeekk-test/mars-open/geometries-ci"
  inputPath = "s3a://zzeekk-test/mars-open/input"
  # only process a subset of the data for CI to speed up the tests
  ppPmtilesFilter = "array_contains(tags, 'Bahn') and array_contains(tags, 'Schmalspur')"
}

global {
  sparkOptions {
    "spark.hadoop.fs.s3a.access.key" = "###ENV#S3_ACCESS_KEY###"
    "spark.hadoop.fs.s3a.secret.key" = "###ENV#S3_SECRET_KEY###"
  }
}